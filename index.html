<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>น้องละหัดไม้ — สายคอม</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0d14;
    --card: #16161f;
    --border: #2a2a3d;
    --accent: #7c6fff;
    --accent2: #ff6f91;
    --green: #4fffb0;
    --text: #e8e8f0;
    --muted: #6b6b88;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    padding-top: 16px;
  }

  header .tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  header h1 {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  header h1 span {
    color: var(--accent);
  }

  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 15px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    max-width: 960px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }

  .card-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .num {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(124,111,255,0.12);
    border: 1px solid rgba(124,111,255,0.3);
    padding: 3px 9px;
    border-radius: 20px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
  }

  .clues {
    padding: 18px 20px;
  }

  .clue {
    display: flex;
    gap: 10px;
    margin-bottom: 11px;
    font-size: 14.5px;
    line-height: 1.5;
    color: var(--text);
  }

  .clue-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    min-width: 18px;
    margin-top: 3px;
  }

  .qr-section {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .qr-wrap {
    background: #fff;
    padding: 10px;
    border-radius: 10px;
    display: inline-block;
  }

  .qr-label {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
    text-align: center;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }

  .modal h2 {
    font-size: 20px;
    margin-bottom: 8px;
    color: var(--text);
  }

  .modal .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }

  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 18px;
    font-family: 'Space Mono', monospace;
    padding: 12px 16px;
    text-align: center;
    letter-spacing: 4px;
    outline: none;
    transition: border-color 0.2s;
  }

  .modal input:focus {
    border-color: var(--accent);
  }

  .modal-btn {
    width: 100%;
    margin-top: 14px;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 16px;
    font-family: 'Sarabun', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .modal-btn:hover { opacity: 0.85; }

  .modal-close {
    margin-top: 12px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    font-family: 'Sarabun', sans-serif;
  }

  .modal-close:hover { color: var(--text); }

  .answer-box {
    display: none;
    margin-top: 16px;
    background: rgba(79,255,176,0.08);
    border: 1px solid rgba(79,255,176,0.3);
    border-radius: 12px;
    padding: 16px;
  }

  .answer-box.show { display: block; }

  .answer-box .label {
    font-size: 12px;
    color: var(--green);
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .answer-box .answer-text {
    font-size: 26px;
    font-weight: 700;
    color: var(--green);
  }

  .error-msg {
    display: none;
    color: var(--accent2);
    font-size: 13px;
    margin-top: 8px;
  }

  .error-msg.show { display: block; }

  .shake {
    animation: shake 0.4s;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  footer {
    text-align: center;
    margin-top: 48px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Space Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="tag">// game · สายคอม</div>
  <h1>น้องละ<span>หัดไม้</span></h1>
  <p>สแกน QR → เห็นคำใบ้ → เดาให้ถูก → ใส่รหัสดูเฉลย</p>
</header>

<div class="grid" id="cards"></div>

<footer>scan · guess · unlock</footer>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>🔐 ใส่รหัสเฉลย</h2>
    <p class="subtitle" id="modal-subtitle">ถ้าเดาได้แล้ว ลองใส่คำตอบดู!</p>
    <input type="text" id="code-input" placeholder="_ _ _ _ _ _" maxlength="20"
      oninput="this.value = this.value.toUpperCase()">
    <div class="error-msg" id="error-msg">❌ รหัสไม่ถูกต้อง ลองใหม่นะ!</div>
    <div class="answer-box" id="answer-box">
      <div class="label">✅ ถูกต้อง! เฉลยคือ</div>
      <div class="answer-text" id="answer-text"></div>
    </div>
    <button class="modal-btn" onclick="checkCode()">ตรวจคำตอบ</button>
    <button class="modal-close" onclick="closeModal()">ปิด</button>
  </div>
</div>

<script>
const quizData = [
  {
    id: 1,
    clues: [
      "ฉันไม่มีตัวตนจริง แต่ทุกคนใช้ฉันทุกวัน",
      "ฉันจำทุกอย่างได้ แต่ถ้าไฟดับฉันลืมหมด",
      "ฉันเร็วมาก แต่แพงและมีพื้นที่น้อย",
      "CPU คุยกับฉันโดยตรงก่อนไปหาคนอื่น"
    ],
    answer: "RAM คำใบ้ข้อ 3 งูเป็นสัญลักษณ์ของฉัน",
    password: "RAM"
  },
  {
    id: 2,
    clues: [
      "ฉันเป็นภาษา แต่คอมไม่เข้าใจฉันโดยตรง",
      "ฉันต้องผ่านคนกลางก่อนถึงจะทำงานได้",
      "ฉันนิยมมากในสาย Data และ AI"
    ],
    answer: "Python",
    password: "PYTHON"
  },
  {
    id: 3,
    clues: [
      "ฉันดูแลทุกคนในบ้าน แต่ฉันไม่ได้อยู่ในบ้าน",
      "ทุกอุปกรณ์ต้องขอผ่านฉันเพื่อออกไปข้างนอก",
      "ฉันแปลงภาษาระหว่างบ้านกับโลกภายนอก",
      "ถ้าฉันพัง อินเทอร์เน็ตใช้ไม่ได้ทั้งบ้าน"
    ],
    answer: "Router",
    password: "ROUTER"
  }
];

let currentPassword = "";

function buildCards() {
  const grid = document.getElementById('cards');
  quizData.forEach(q => {
    const card = document.createElement('div');
    card.className = 'card';

    const cluesHTML = q.clues.map((c, i) =>
      `<div class="clue"><span class="clue-num">${i+1}.</span><span>${c}</span></div>`
    ).join('');

    card.innerHTML = `
      <div class="card-header">
        <span class="num">#${String(q.id).padStart(2,'0')}</span>
        <span class="card-title">ฉันคือใคร?</span>
      </div>
      <div class="clues">${cluesHTML}</div>
      <div class="qr-section">
        <div class="qr-wrap" id="qr-${q.id}"></div>
        <span class="qr-label">สแกนเพื่ออ่านคำใบ้ → ใส่รหัสดูเฉลย</span>
      </div>
    `;

    grid.appendChild(card);
  });
}

function generateQRCodes() {
  quizData.forEach(q => {
    const clueText = q.clues.map((c, i) => `${i+1}. ${c}`).join('\n');
    const content = `น้องละหัดไม้ ข้อที่ ${q.id}\n\n${clueText}\n\nใส่รหัส: ${q.password}`;
    const encoded = encodeURIComponent(content);
    const url = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encoded}&margin=0`;
    const wrap = document.getElementById(`qr-${q.id}`);
    const img = document.createElement('img');
    img.src = url;
    img.width = 160;
    img.height = 160;
    img.alt = `QR ข้อที่ ${q.id}`;
    wrap.appendChild(img);
  });
}

function openModal(questionId) {
  const q = quizData.find(x => x.id === questionId);
  currentPassword = q.password;
  document.getElementById('modal-subtitle').textContent = `ข้อที่ ${q.id} — เดาได้แล้วใส่คำตอบ!`;
  document.getElementById('code-input').value = '';
  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('answer-box').classList.remove('show');
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('code-input').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function checkCode() {
  const input = document.getElementById('code-input').value.trim().toUpperCase();
  const answerBox = document.getElementById('answer-box');
  const errorMsg = document.getElementById('error-msg');

  if (input === currentPassword) {
    const q = quizData.find(x => x.password === currentPassword);
    document.getElementById('answer-text').textContent = q.answer;
    answerBox.classList.add('show');
    errorMsg.classList.remove('show');
  } else {
    errorMsg.classList.add('show');
    answerBox.classList.remove('show');
    const inp = document.getElementById('code-input');
    inp.classList.remove('shake');
    void inp.offsetWidth;
    inp.classList.add('shake');
  }
}

document.getElementById('code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkCode();
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// Add click to open modal on each card
function addCardClicks() {
  quizData.forEach(q => {
    const cards = document.querySelectorAll('.card');
    cards[q.id - 1].style.cursor = 'pointer';
    cards[q.id - 1].querySelector('.qr-section').addEventListener('click', () => openModal(q.id));
  });
}

buildCards();
generateQRCodes();
addCardClicks();
</script>
</body>
</html>
