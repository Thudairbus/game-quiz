*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;min-height:100vh;padding:24px 16px 48px;}
header{text-align:center;margin-bottom:40px;padding-top:16px;}
header .tag{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:10px;}
header h1{font-size:clamp(26px,5vw,40px);font-weight:700;line-height:1.2;}
header h1 span{color:var(--accent);}
header p{margin-top:10px;color:var(--muted);font-size:15px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;max-width:960px;margin:0 auto;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:transform 0.2s,border-color 0.2s;cursor:pointer;}
.card:hover{transform:translateY(-3px);border-color:var(--accent);}
.card-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.num{font-family:'Space Mono',monospace;font-size:12px;color:var(--accent);background:rgba(124,111,255,0.12);border:1px solid rgba(124,111,255,0.3);padding:3px 9px;border-radius:20px;}
.card-title{font-size:15px;font-weight:600;color:var(--muted);}
.clues{padding:18px 20px;}
.clue{display:flex;gap:10px;margin-bottom:11px;font-size:14.5px;line-height:1.5;}
.clue-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2);min-width:18px;margin-top:3px;}
.qr-section{padding:16px 20px 20px;border-top:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:12px;}
.qr-wrap{background:#fff;padding:10px;border-radius:10px;display:inline-block;}
.qr-wrap canvas{display:block;}
.qr-label{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:1px;text-align:center;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;max-width:380px;width:100%;text-align:center;}
.modal h2{font-size:20px;margin-bottom:8px;}
.modal .subtitle{color:var(--muted);font-size:14px;margin-bottom:24px;}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:18px;font-family:'Space Mono',monospace;padding:12px 16px;text-align:center;letter-spacing:4px;outline:none;transition:border-color 0.2s;}
.modal input:focus{border-color:var(--accent);}
.modal-btn{width:100%;margin-top:14px;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:16px;font-family:'Sarabun',sans-serif;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.modal-btn:hover{opacity:0.85;}
.modal-close{margin-top:12px;background:transparent;border:none;color:var(--muted);font-size:14px;cursor:pointer;font-family:'Sarabun',sans-serif;}
.answer-box{display:none;margin-top:16px;background:rgba(79,255,176,0.08);border:1px solid rgba(79,255,176,0.3);border-radius:12px;padding:16px;}
.answer-box.show{display:block;}
.answer-box .label{font-size:12px;color:var(--green);font-family:'Space Mono',monospace;letter-spacing:2px;margin-bottom:8px;}
.answer-box .answer-text{font-size:26px;font-weight:700;color:var(--green);}
.error-msg{display:none;color:var(--accent2);font-size:13px;margin-top:8px;}
.error-msg.show{display:block;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.shake{animation:shake 0.4s;}
footer{text-align:center;margin-top:48px;color:var(--muted);font-size:13px;font-family:'Space Mono',monospace;}
</style>
</head>

var quizData=[
  {id:1,clues:["ฉันไม่มีตัวตนจริง แต่ทุกคนใช้ฉันทุกวัน","ฉันจำทุกอย่างได้ แต่ถ้าไฟดับฉันลืมหมด","ฉันเร็วมาก แต่แพงและมีพื้นที่น้อย","CPU คุยกับฉันโดยตรงก่อนไปหาคนอื่น"],answer:"RAM",password:"RAM"},
  {id:2,clues:["ฉันเป็นภาษา แต่คอมไม่เข้าใจฉันโดยตรง","ฉันต้องผ่านคนกลางก่อนถึงจะทำงานได้","งูเป็นสัญลักษณ์ของฉัน","ฉันนิยมมากในสาย Data และ AI"],answer:"Python",password:"PYTHON"},
  {id:3,clues:["ฉันดูแลทุกคนในบ้าน แต่ฉันไม่ได้อยู่ในบ้าน","ทุกอุปกรณ์ต้องขอผ่านฉันเพื่อออกไปข้างนอก","ฉันแปลงภาษาระหว่างบ้านกับโลกภายนอก","ถ้าฉันพัง อินเทอร์เน็ตใช้ไม่ได้ทั้งบ้าน"],answer:"Router",password:"ROUTER"}
];

var currentPassword='';

function buildCards(){
  var grid=document.getElementById('cards');
  quizData.forEach(function(q){
    var card=document.createElement('div');
    card.className='card';
    card.onclick=function(){openModal(q.id);};
    var cluesHTML=q.clues.map(function(c,i){
      return '<div class="clue"><span class="clue-num">'+(i+1)+'.</span><span>'+c+'</span></div>';
    }).join('');
    card.innerHTML='<div class="card-header"><span class="num">#0'+q.id+'</span><span class="card-title">ฉันคือใคร?</span></div><div class="clues">'+cluesHTML+'</div>';
    grid.appendChild(card);
  });
}

function generateQRCodes(){
  quizData.forEach(function(q){
    var text='น้องละหัดไม้ ข้อ'+q.id+'\n\n'+q.clues.map(function(c,i){return(i+1)+'. '+c;}).join('\n')+'\n\nรหัสเฉลย: '+q.password;
    new QRCode(document.getElementById('qr-'+q.id),{text:text,width:160,height:160,colorDark:'#000000',colorLight:'#ffffff'});
  });
}

function openModal(id){
  var q=quizData.find(function(x){return x.id===id;});
  currentPassword=q.password;
  document.getElementById('modal-subtitle').textContent='ข้อที่ '+q.id+' — เดาได้แล้วใส่คำตอบ!';
  document.getElementById('code-input').value='';
  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('answer-box').classList.remove('show');
  document.getElementById('modal').classList.add('open');
  setTimeout(function(){document.getElementById('code-input').focus();},100);
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

function checkCode(){
  var input=document.getElementById('code-input').value.trim().toUpperCase();
  if(input===currentPassword){
    var q=quizData.find(function(x){return x.password===currentPassword;});
    document.getElementById('answer-text').textContent=q.answer;
    document.getElementById('answer-box').classList.add('show');
    document.getElementById('error-msg').classList.remove('show');
  } else {
    document.getElementById('error-msg').classList.add('show');
    document.getElementById('answer-box').classList.remove('show');
    var inp=document.getElementById('code-input');
    inp.classList.remove('shake');void inp.offsetWidth;inp.classList.add('shake');
  }
}

document.getElementById('code-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkCode();});
document.getElementById('modal').addEventListener('click',function(e){if(e.target===document.getElementById('modal'))closeModal();});

buildCards();
